friday:
  date: "2026-10-02"
  title:
    nb: Fredag 2. oktober
    en: Friday, October 2
  events:
    - time: "10:00–16:00"
      title:
        nb: Tradisjonell gårdsbrygging i eldhus fra 1600-tallet
        en: Traditional farmhouse brewing workshop in a 17th-century eldhus
      description:
        nb: >-
          Ledet av Stig Seljeset (kveik #22 Stalljen). Einerlåg, mesking,
          renning, kjøling, tilsetting av kveik (med tradisjonell skriking).
          Ingen koking (rå-øl). Inkluderer spekemat, flatbrød-lunsj og kornøl.
        en: >-
          Led by Stig Seljeset (kveik #22 Stalljen). Juniper infusion, mashing,
          lautering, cooling, kveik pitching (with traditional screaming).
          No boiling (raw ale). Includes traditional cured meats, flatbread lunch,
          and kornøl.
      note:
        nb: Egen billett (Bryggepass).
        en: Separate ticket (Brewing Pass).
    - time: "11:00–15:00"
      title:
        nb: Bryggeøkt kun for kvinner
        en: Women-only brewing session
      note:
        nb: Egen billett.
        en: Separate ticket.
    - time: "17:00"
      title:
        nb: Dørene åpner
        en: Doors open
    - time: "18:00"
      title:
        nb: Offisiell festivalåpning
        en: Official festival opening
    - time: "20:00"
      title:
        nb: Hjemmebryggerene pakker sammen; kommersielle bryggerier begynner salg
        en: Home brewers pack up; commercial breweries begin sales
    - time: "00:30"
      title:
        nb: Festivalen stenger
        en: Festival closes

saturday:
  date: "2026-10-03"
  title:
    nb: Lørdag 3. oktober
    en: Saturday, October 3
  events:
    - time: "12:00"
      title:
        nb: Festivalen åpner
        en: Festival opens
    - time: "18:45"
      title:
        nb: Festivalmiddag på Raftevold Hotel.
        en: Festival dinner at Raftevold Hotel.
      description:
        nb: >-
          Tradisjonell mat: saudehaud (smalahove), kokte poteter, kålrotstappe,
          Nordfjord-pannekaker. Tre typer tradisjonelt øl: Hornindal konnjøl,
          Voss heimabrygg, Stjørdalsøl.
        en: >-
          Traditional fare: saudehaud (sheep's head), boiled potatoes, rutabaga mash,
          Nordfjord pancakes. Three styles of traditional ale: Hornindal konnjøl,
          Voss homebrew, Stjørdalsøl.
      note:
        nb: Egen billett.
        en: Separate ticket.
    - time: "01:00"
      title:
        nb: Festivalen stenger
        en: Festival closes

