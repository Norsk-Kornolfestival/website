thursday:
  date: "2026-10-01"
  title:
    nb: Torsdag 1. oktober
    en: Thursday, October 1
  events:
    - time: "16:50"
      title:
        nb: Buss frå Vigra (Ålesund) flyplass til Hornindal.
        en: Bus from Vigra (Ålesund) airport to Hornindal.
      note:
        nb: Fly som landar 1620 er OK.
        en: Planes landing 1620 are OK.
    - time: "19:30–22:00"
      title:
        nb: Oppskåke – opningsfeiring i historisk gardsbygning.
        en: Oppskåke – opening celebration in historic farmhouse building.
