<nav class="language-switcher" aria-label="{{ i18n "language" }}">
  <ul>
    {{ range .Translations }}
    <li><a href="{{ .RelPermalink }}" lang="{{ .Lang }}" hreflang="{{ .Lang }}">{{ .Language.LanguageName }}</a></li>
    {{ end }}
    {{ if not .Translations }}
      {{ if eq .Lang "nb" }}
      <li><a href="{{ site.Home.RelPermalink }}en/" lang="en" hreflang="en">English</a></li>
      {{ else }}
      {{ $nbHome := index site.Sites 0 }}
      <li><a href="{{ $nbHome.Home.RelPermalink }}" lang="nb" hreflang="nb">Norsk</a></li>
      {{ end }}
    {{ end }}
  </ul>
</nav>
