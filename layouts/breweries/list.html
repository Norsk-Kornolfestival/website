{{ define "main" }}
<div class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-desc">{{ . }}</p>{{ end }}
  </div>
</div>
<div class="container page-content">
  {{ $lang := .Lang }}
  <div class="card-grid">
    {{ range site.Data.breweries }}
    <div class="card">
      <div class="card-logo">
        <img src="{{ .logo | relURL }}" alt="{{ .name }}" loading="lazy">
      </div>
      <div class="card-body">
        <h3>{{ .name }}</h3>
        <p class="card-location">{{ index .location $lang }}</p>
        <p>{{ index .description $lang }}</p>
        {{ if ne .url "#" }}<a href="{{ .url }}" class="card-link" rel="noopener">{{ .url | replaceRE "^https?://" "" }} &rarr;</a>{{ end }}
      </div>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
