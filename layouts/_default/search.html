{{ define "main" }}
<div class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-desc">{{ . }}</p>{{ end }}
  </div>
</div>
<div class="container page-content">
  <div id="search"></div>
</div>
<link rel="stylesheet" href="{{ "pagefind/pagefind-ui.css" | relURL }}">
<script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>
<script>
  window.addEventListener('DOMContentLoaded', function () {
    new PagefindUI({
      element: "#search",
      showSubResults: true,
      {{ if eq .Lang "nb" }}
      translations: {
        placeholder: "Søk…",
        zero_results: "Ingen resultater for [SEARCH_TERM]",
        many_results: "[COUNT] resultater for [SEARCH_TERM]",
        one_result: "[COUNT] resultat for [SEARCH_TERM]",
        searching: "Søker etter [SEARCH_TERM]…",
        alt_search: "Ingen resultater for [SEARCH_TERM]. Viser resultater for [DIFFERENT_TERM] i stedet",
        search_suggestion: "Ingen resultater for [SEARCH_TERM]. Prøv et av disse søkene:",
        load_more: "Last inn flere resultater"
      }
      {{ end }}
    });
  });
</script>
{{ end }}
