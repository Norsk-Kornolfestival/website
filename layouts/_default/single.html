{{ define "main" }}
<div class="page-header">
  <div class="container">
    <span class="section-label" style="color:var(--oransje); border-bottom-color:rgba(243,241,220,0.12);">{{ .Section | humanize }}</span>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-desc">{{ . }}</p>{{ end }}
  </div>
</div>
<article class="container page-content">
  {{ .Content }}
</article>
{{ end }}
