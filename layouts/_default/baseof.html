<!DOCTYPE html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">

  {{/* Open Graph */}}
  <meta property="og:title"       content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta property="og:type"        content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url"         content="{{ .Permalink }}">
  <meta property="og:image"       content="{{ "images/hero/solnedgang.jpg" | absURL }}">
  <meta property="og:locale"      content="{{ .Lang }}">

  {{/* Preload brand font */}}
  <link rel="preload" href="/fonts/MaleriSN-Book.woff2" as="font" type="font/woff2" crossorigin>

  {{/* Preload hero image on homepage */}}
  {{ if .IsHome }}
  <link rel="preload" as="image" href="{{ "images/hero/kd.jpg" | relURL }}">
  {{ end }}

  {{- $css := resources.Get "css/main.css" | minify | fingerprint -}}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
  {{ hugo.Generator }}
</head>
<body>
  {{ partial "header.html" . }}
  <main data-pagefind-body>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}

  <script>
    document.querySelector('.nav-toggle')?.addEventListener('click', function() {
      const nav = document.querySelector('.main-nav');
      nav.classList.toggle('open');
      this.setAttribute('aria-expanded', nav.classList.contains('open'));
    });
  </script>
</body>
</html>
