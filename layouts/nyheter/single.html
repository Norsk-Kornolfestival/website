{{ define "main" }}
<article class="container page-content">
  <div class="post-header">
    <h1>{{ .Title }}</h1>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ i18n "posted_on" }} {{ .Date.Format "2. January 2006" }}</time>
  </div>
  {{ .Content }}
  <nav class="post-nav">
    <a href="{{ with site.GetPage "/nyheter" }}{{ .RelPermalink }}{{ end }}">← {{ i18n "back_to_news" }}</a>
  </nav>
</article>
{{ end }}
