name: "Sponsor"
description: "Legg til eller oppdater en sponsor / Add or update a sponsor"
labels: ["sponsor"]
body:
  - type: input
    id: name
    attributes:
      label: Sponsornavn / Sponsor name
      placeholder: "F.eks: Brewshop"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Nettside / Website
      placeholder: "https://..."

  - type: dropdown
    id: language
    attributes:
      label: Språk / Language
      description: "Hvilket språk er teksten skrevet på? / What language is the text in?"
      options:
        - Norsk
        - English
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Beskrivelse / Description
      description: "Kort beskrivelse av sponsoren og hva de sponser. / Short description of the sponsor and what they provide."
      placeholder: "Skriv her..."
    validations:
      required: true

  - type: textarea
    id: news_text
    attributes:
      label: Nyhetsartikkel / News article (valgfritt / optional)
      description: "Vil du at vi skal lage en nyhetsartikkel om sponsoren? Skriv den her. / Want a news article about the sponsor? Write it here."
      placeholder: "Valgfritt / Optional"
